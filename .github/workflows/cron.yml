name: Cron

on:
  schedule:
    # Snapshot syncs (proposals + votes + whale detection) — every 5 min
    - cron: '*/5 * * * *'
    # AI summaries — every 15 min (Gemini is fast but we batch to save tokens)
    - cron: '*/15 * * * *'
    # Democracy Score recompute — daily at 02:00 UTC
    - cron: '0 2 * * *'
    # DeFiLlama treasury refresh — daily at 03:00 UTC
    - cron: '0 3 * * *'
    # Weekly digest — Monday 08:00 UTC
    - cron: '0 8 * * 1'
    # Delegate profiles rebuild — daily at 04:00 UTC (paginated)
    - cron: '0 4 * * *'
    # Token price refresh — every 6 hours (CoinGecko free tier)
    - cron: '0 */6 * * *'

  # Allow manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: sync-proposals
        type: choice
        options:
          - sync-proposals
          - sync-votes
          - generate-summaries
          - compute-scores
          - sync-treasuries
          - send-digest
          - rebuild-delegates
          - sync-prices
          - sync-tally

concurrency:
  group: cron-${{ github.event.schedule || github.event.inputs.job }}
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    # 60 min upper bound covers a full paginated rebuild-delegates walk.
    timeout-minutes: 60
    steps:
      - name: Resolve endpoints for this trigger
        id: plan
        run: |
          SCHED="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.job }}"

          case "$SCHED" in
            "*/5 * * * *")
              echo "endpoints=sync-proposals,__votes_pages__,__tally_pages__" >> $GITHUB_OUTPUT
              ;;
            "*/15 * * * *")
              echo "endpoints=generate-summaries" >> $GITHUB_OUTPUT
              ;;
            "0 2 * * *")
              echo "endpoints=compute-scores" >> $GITHUB_OUTPUT
              ;;
            "0 3 * * *")
              echo "endpoints=sync-treasuries" >> $GITHUB_OUTPUT
              ;;
            "0 8 * * 1")
              echo "endpoints=send-digest" >> $GITHUB_OUTPUT
              ;;
            "0 4 * * *")
              echo "endpoints=__delegates_pages__" >> $GITHUB_OUTPUT
              ;;
            "0 */6 * * *")
              echo "endpoints=sync-prices" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "endpoints=$MANUAL" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Hit /api/cron endpoints
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret missing. Set it in repo Settings → Secrets → Actions."
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret missing."
            exit 1
          fi

          ENDPOINTS="${{ steps.plan.outputs.endpoints }}"

          # workflow_dispatch with rebuild-delegates → also go through paginated path
          if [ "$ENDPOINTS" = "rebuild-delegates" ]; then
            ENDPOINTS="__delegates_pages__"
          fi
          # workflow_dispatch with sync-votes → also paginated path
          if [ "$ENDPOINTS" = "sync-votes" ]; then
            ENDPOINTS="__votes_pages__"
          fi
          # workflow_dispatch with sync-tally → also paginated path
          if [ "$ENDPOINTS" = "sync-tally" ]; then
            ENDPOINTS="__tally_pages__"
          fi

          # Helper: walk paginated cron endpoint until done:true
          # Args: 1=label  2=endpoint  3=limit  4=max_pages
          walk_pages() {
            local label="$1"
            local endpoint="$2"
            local limit="$3"
            local max_pages="$4"
            local offset=0
            local page=0
            while [ "$page" -lt "$max_pages" ]; do
              url="$APP_URL/api/cron/$endpoint?offset=$offset&limit=$limit"
              echo "→ $label page $page  offset=$offset"
              code=$(curl -s -o /tmp/body.json -w "%{http_code}" \
                -H "Authorization: Bearer $CRON_SECRET" \
                --max-time 290 \
                "$url" || echo "000")
              echo "← HTTP $code"
              cat /tmp/body.json || true
              echo ""
              if [ "$code" != "200" ]; then
                echo "::warning::$label page $page returned $code — aborting walk"
                return 1
              fi
              done_flag=$(jq -r '.result.done // false' < /tmp/body.json 2>/dev/null || echo "false")
              if [ "$done_flag" = "true" ]; then
                echo "✓ $label complete after $((page + 1)) pages"
                return 0
              fi
              offset=$((offset + limit))
              page=$((page + 1))
            done
          }

          # Iterate comma-separated endpoint list; expand __*_pages__ tokens.
          IFS=',' read -ra JOBS <<< "$ENDPOINTS"
          for job in "${JOBS[@]}"; do
            if [ "$job" = "__delegates_pages__" ]; then
              walk_pages "rebuild-delegates" "rebuild-delegates" 100 30 || true
              continue
            fi
            if [ "$job" = "__votes_pages__" ]; then
              walk_pages "sync-votes" "sync-votes" 5 12 || true
              continue
            fi
            if [ "$job" = "__tally_pages__" ]; then
              walk_pages "sync-tally" "sync-tally" 10 8 || true
              continue
            fi

            url="$APP_URL/api/cron/$job"
            echo "→ POST $url"
            code=$(curl -s -o /tmp/body.json -w "%{http_code}" \
              -H "Authorization: Bearer $CRON_SECRET" \
              --max-time 290 \
              "$url" || echo "000")
            echo "← HTTP $code"
            cat /tmp/body.json || true
            echo ""
            if [ "$code" != "200" ]; then
              echo "::warning::$job returned $code"
            fi
          done
